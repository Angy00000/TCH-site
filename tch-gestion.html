<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCH Gestion — AngyCompany</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Fraunces:ital@1&family=Work+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#15130F;
  --bg-grad: radial-gradient(1200px 600px at 100% -10%, rgba(217,165,82,.10), transparent), radial-gradient(900px 500px at -10% 100%, rgba(181,81,46,.08), transparent);
  --panel:#201D17;
  --panel-2:#282318;
  --line:#3A3227;
  --gold:#D9A552;
  --gold-dim:#A9803D;
  --gold-soft:rgba(217,165,82,.14);
  --terracotta:#B5512E;
  --terracotta-soft:rgba(181,81,46,.16);
  --rose:#C9554F;
  --rose-soft:rgba(201,85,79,.16);
  --teal:#4f9a9b;
  --teal-soft:rgba(79,154,155,.16);
  --green:#5c8a5a;
  --green-soft:rgba(92,138,90,.16);
  --grey-soft:rgba(169,164,154,.14);
  --text:#F2EFE6;
  --text-dim:#A9A49A;
  --text-faint:#6B675F;
  --radius:12px;
}
*{box-sizing:border-box;}
html{background:var(--bg);}
body{margin:0;background-color:var(--bg);color:var(--text);font-family:'Work Sans',sans-serif;min-height:100vh;}
.app{background-color:var(--bg);}
h1,h2,h3{font-family:'Anton',sans-serif;font-weight:400;text-transform:uppercase;letter-spacing:.01em;margin:0;}
.mono{font-family:'Space Mono',monospace;letter-spacing:.04em;}
.accent-script{font-family:'Fraunces',serif;font-style:italic;font-weight:400;text-transform:none;letter-spacing:0;}
.app{display:flex;min-height:100vh;}
::selection{background:var(--gold-soft);}

/* SIDEBAR */
.sidebar{width:236px;flex-shrink:0;background:linear-gradient(180deg,var(--panel),#191510);border-right:1px solid var(--line);padding:24px 16px;display:flex;flex-direction:column;}
.brand{padding:0 8px 20px 8px;border-bottom:1px solid var(--line);margin-bottom:20px;}
.brand .eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-family:'Space Mono',monospace;}
.brand h1{font-size:22px;margin-top:4px;background:linear-gradient(90deg,var(--text),var(--gold));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.brand .sub{font-size:11px;color:var(--text-faint);margin-top:2px;}
.wax{height:3px;margin-top:14px;background:repeating-linear-gradient(90deg,var(--gold) 0 6px,var(--rose) 6px 8px,transparent 8px 13px);opacity:.7;border-radius:2px;}
nav{display:flex;flex-direction:column;gap:3px;flex:1;}
.navbtn{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:var(--radius);color:var(--text-dim);background:none;border:none;font-size:14px;font-family:'Work Sans',sans-serif;text-align:left;cursor:pointer;transition:background .15s,color .15s;white-space:nowrap;flex-shrink:0;}
.navbtn svg{width:16px;height:16px;flex-shrink:0;opacity:.75;}
.navbtn .num{font-family:'Space Mono',monospace;font-size:10px;color:var(--text-faint);margin-left:auto;}
.navbtn:hover{background:var(--panel-2);color:var(--text);}
.navbtn.active{background:var(--gold-soft);color:var(--gold);}
.navbtn.active svg{opacity:1;}
.navbtn.active .num{color:var(--gold);}
.sidebar-foot{font-size:10px;color:var(--text-faint);padding:8px;}

/* MAIN */
main{flex:1;padding:32px 40px;max-width:1120px;background-color:var(--bg);}
.viewhead{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px;}
.viewhead .eyebrow{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-family:'Space Mono',monospace;}
.viewhead h2{font-size:28px;margin-top:4px;}
.btn{background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#1a1611;border:none;padding:10px 18px;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;font-family:'Work Sans',sans-serif;box-shadow:0 2px 10px rgba(217,165,82,.25);transition:transform .12s,box-shadow .12s;}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(217,165,82,.35);}
.btn.ghost{background:none;border:1px solid var(--line);color:var(--text-dim);box-shadow:none;}
.btn.ghost:hover{border-color:var(--gold-dim);color:var(--text);transform:none;box-shadow:none;}
.btn.danger{background:none;border:1px solid var(--terracotta);color:var(--terracotta);box-shadow:none;}

/* KPI CARDS */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px;}
.kpi{background:var(--panel);border:1px solid var(--line);border-top:3px solid var(--line);border-radius:var(--radius);padding:16px 18px;transition:transform .15s,border-color .15s;}
.kpi:hover{transform:translateY(-2px);}
.kpi .label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-faint);}
.kpi .value{font-family:'Space Mono',monospace;font-size:24px;margin-top:8px;color:var(--text);}
.kpi.c-gold{border-top-color:var(--gold);} .kpi.c-gold .value{color:var(--gold);}
.kpi.c-terracotta{border-top-color:var(--terracotta);} .kpi.c-terracotta .value{color:var(--terracotta);}
.kpi.c-rose{border-top-color:var(--rose);} .kpi.c-rose .value{color:var(--rose);}
.kpi.c-teal{border-top-color:var(--teal);} .kpi.c-teal .value{color:var(--teal);}
.kpi.c-green{border-top-color:var(--green);} .kpi.c-green .value{color:var(--green);}

/* TABLES */
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-family:'Space Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-faint);padding:10px 12px;border-bottom:1px solid var(--line);}
td{padding:10px 12px;border-bottom:1px solid var(--line);color:var(--text-dim);}
tr:hover td{background:var(--panel-2);}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-bottom:20px;}
.panel-title{padding:14px 16px;border-bottom:1px solid var(--line);font-size:13px;font-weight:600;color:var(--text);display:flex;justify-content:space-between;align-items:center;}
.panel-title .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:8px;}

/* SWATCHES */
.swatch{display:inline-block;width:12px;height:12px;border-radius:50%;margin-right:7px;vertical-align:middle;border:1px solid rgba(255,255,255,.25);}
.swatch.noir{background:#171512;}
.swatch.blanc{background:#f7f3ea;border-color:#7a705f;}
.swatch.rose{background:var(--rose);}
.swatch.écru{background:#e4d6b8;}

/* STOCK QTY INPUT */
.qtyinput{width:60px;background:var(--bg);border:1px solid var(--line);color:var(--text);padding:5px 8px;border-radius:6px;font-family:'Space Mono',monospace;text-align:center;}
.qtyinput.low{border-color:var(--terracotta);color:var(--terracotta);}

/* STATUS PILL */
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-family:'Space Mono',monospace;border:1px solid var(--line);}
.pill.s1{color:var(--text-dim);background:var(--grey-soft);}
.pill.s2{color:var(--gold);border-color:var(--gold-dim);background:var(--gold-soft);}
.pill.s3{color:var(--teal);border-color:var(--teal);background:var(--teal-soft);}
.pill.s4{color:var(--green);border-color:var(--green);background:var(--green-soft);}
.pill.s5{color:var(--terracotta);border-color:var(--terracotta);background:var(--terracotta-soft);}
select.statusselect{background:var(--bg);color:var(--text);border:1px solid var(--line);border-radius:6px;font-size:12px;padding:4px 6px;font-family:'Work Sans',sans-serif;}

/* CATEGORY PILLS (dépenses) */
.catpill{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:20px;font-size:12px;}
.catpill .dot{width:7px;height:7px;border-radius:50%;}

/* FORM MODAL */
.overlay{position:fixed;inset:0;background:rgba(10,8,6,.72);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:50;}
.overlay.open{display:flex;}
.modal{background:var(--panel);border:1px solid var(--line);border-top:3px solid var(--gold);border-radius:var(--radius);padding:26px;width:420px;max-width:92vw;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.modal h3{margin-bottom:16px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-faint);margin-bottom:6px;}
.field input,.field select{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--text);padding:9px 10px;border-radius:6px;font-family:'Work Sans',sans-serif;font-size:14px;}
.field input:focus,.field select:focus{outline:none;border-color:var(--gold-dim);}
.field-row{display:flex;gap:10px;}
.field-row .field{flex:1;}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}
.empty{padding:40px;text-align:center;color:var(--text-faint);font-size:13px;}
.hint{font-size:11px;color:var(--text-faint);margin-top:-14px;margin-bottom:18px;}
.toast{position:fixed;bottom:24px;right:24px;background:linear-gradient(135deg,var(--green),#3a6f52);color:#f5efe6;padding:12px 18px;border-radius:8px;font-size:13px;font-weight:600;display:none;z-index:60;box-shadow:0 8px 24px rgba(0,0,0,.35);}
.toast.show{display:block;animation:toastin .2s ease-out;}
@keyframes toastin{from{transform:translateY(8px);opacity:0;}to{transform:translateY(0);opacity:1;}}
main{animation:fadein .25s ease-out;}
@keyframes fadein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
@media(max-width:800px){
  .app{flex-direction:column;}
  .sidebar{width:100%;flex-direction:row;overflow-x:auto;padding:10px 12px;-webkit-overflow-scrolling:touch;}
  .brand,.wax,.sidebar-foot{display:none;}
  nav{flex-direction:row;gap:6px;}
  .navbtn{font-size:13px;padding:9px 12px;}
  .navbtn .num{display:none;}
  main{padding:20px;}
  .kpis{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

  <aside class="sidebar">
    <div class="brand">
      <div class="eyebrow">AngyCompany</div>
      <h1>TCH Gestion</h1>
      <div class="sub accent-script">Tradition · Culture · Héritage</div>
      <div class="wax"></div>
    </div>
    <nav id="nav"></nav>
    <div class="sidebar-foot">Données partagées entre les administrateurs TCH.</div>
  </aside>
  <main id="main"></main>
</div>

<div class="overlay" id="overlay"><div class="modal" id="modalBody"></div></div>
<div class="toast" id="toast"></div>

async function loadState(){
  if(!supabaseReady){
    document.getElementById('main').innerHTML = `<div class="empty" style="padding:60px 20px;">Supabase n'est pas encore configuré.<br>Ouvre le fichier et remplace les valeurs "REMPLACE_MOI" par l'URL et la clé de ton projet Supabase.</div>`;
    return;
  }
  try{
    const { data, error } = await sb.from(TABLE).select('payload').eq('id', ROW_ID).maybeSingle();
    if(error) throw error;
    if(data && data.payload) state = JSON.parse(data.payload);
  }catch(e){ console.error(e); showToast("Connexion à la base impossible"); }
  if(!state.stock || Object.keys(state.stock).length===0) state.stock = defaultStock();
  if(!state.commandes) state.commandes = [];
  if(!state.depenses) state.depenses = [];
  if(!state.caisse) state.caisse = [];
  if(!state.settings) state.settings = {coutUnitaire:4000};
  render();
  // Synchro en direct : si quelqu'un d'autre modifie, la vue se met à jour toute seule
  try{
    sb.channel('tch_gestion_state_changes')
      .on('postgres_changes', {event:'*', schema:'public', table:TABLE}, payload=>{
        const row = payload.new;
        if(row && row.payload){
          const incoming = JSON.parse(row.payload);
          if(JSON.stringify(incoming) !== JSON.stringify(state)){
            state = incoming;
            render();
          }
        }
      })
      .subscribe((status, err)=>{
        if(status === 'CHANNEL_ERROR' || status === 'TIMED_OUT'){
          console.warn('Synchro temps réel indisponible, mode manuel activé.', err);
        }
      });
  }catch(e){ console.warn('Synchro temps réel non disponible', e); }
}

async function saveState(){
  if(!supabaseReady) return;
  try{
    const { error } = await sb.from(TABLE).upsert({ id: ROW_ID, payload: JSON.stringify(state), updated_at: new Date().toISOString() });
    if(error) throw error;
  }catch(e){ console.error(e); showToast("Erreur de sauvegarde — vérifie ta connexion."); }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 2200);
}

function computeKPIs(){
  const actives = state.commandes.filter(c=>c.statut!=='Annulée');
  const ca = actives.reduce((s,c)=> s + c.quantite*c.prixUnitaire, 0);
  const enAttente = state.commandes.filter(c=> c.statut==='Reçue' || c.statut==='En traitement').length;
  let stockBas = 0;
  PRODUITS.forEach(p=> COULEURS.forEach(c=>{ if((state.stock[p][c]||0) <= SEUIL_BAS) stockBas++; }));
  const cout = actives.reduce((s,c)=> s + c.quantite*(state.settings.coutUnitaire||0), 0);
  const totalDepenses = state.depenses.reduce((s,d)=> s + d.montant, 0);
  const benefice = ca - cout - totalDepenses;
  return {ca, enAttente, stockBas, cout, totalDepenses, benefice};
}

function render(){
  renderNav();
  const main = document.getElementById('main');
  if(view==='dashboard') main.innerHTML = renderDashboard();
  else if(view==='stock') main.innerHTML = renderStock();
  else if(view==='commandes') main.innerHTML = renderCommandes();
  else if(view==='clients') main.innerHTML = renderClients();
  else if(view==='finances') main.innerHTML = renderFinances();
  else if(view==='depenses') main.innerHTML = renderDepenses();
  else if(view==='caisse') main.innerHTML = renderCaisse();
}

      rows += `<tr><td style="display:flex;align-items:center;gap:10px;border-bottom:none;"><img src="${PRODUCT_IMAGES[p][c]}" title="${p} — ${c}" style="width:32px;height:32px;object-fit:cover;border-radius:5px;flex-shrink:0;border:1px solid var(--line);display:block;">${p}</td><td style="text-transform:capitalize"><span class="swatch ${c}"></span>${c}</td><td><input class="qtyinput ${qty<=SEUIL_BAS?'low':''}" type="number" min="0" value="${qty}" onchange="updateStock('${p}','${c}',this.value)"></td><td>${qty<=SEUIL_BAS?'<span class=\"pill s5\">Stock bas</span>':'<span class=\"pill s4\">OK</span>'}</td></tr>`;

  });
  return `
    <div class="viewhead"><div><div class="eyebrow">Inventaire</div><h2>Stock</h2></div><button class="btn ghost" onclick="resetStock()">Tout mettre à zéro</button></div>

  `;
}

function resetStock(){
  if(!confirm("Mettre tout le stock à 0 ? Cette action est irréversible.")) return;
  PRODUITS.forEach(p=> COULEURS.forEach(c=>{ state.stock[p][c] = 0; }));
  saveState();
  render();
  showToast("Stock remis à zéro");
}

function updateStock(p,c,val){
  state.stock[p][c] = Math.max(0, parseInt(val)||0);
  saveState();
  render();
}

  document.getElementById('modalBody').innerHTML = `
    <h3>Nouvelle commande</h3>
    <div class="field-row">
      <div class="field"><label>Nom du client</label><input id="f-nom" placeholder="Ex: Awa Diop"></div>
      <div class="field"><label>Téléphone</label><input id="f-tel" placeholder="77 000 00 00"></div>
    </div>
    <div class="field"><label>Quartier / ville</label><input id="f-quartier" placeholder="Ex: Fadiouth, Thiès"></div>
    <div class="field-row">
      <div class="field"><label>Produit</label><select id="f-produit">${PRODUITS.map(p=>`<option>${p}</option>`).join('')}</select></div>
      <div class="field"><label>Coloris</label><select id="f-couleur">${COULEURS.map(c=>`<option>${c}</option>`).join('')}</select></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Quantité</label><input id="f-qty" type="number" min="1" value="1"></div>
      <div class="field"><label>Prix unitaire (FCFA)</label><input id="f-prix" type="number" value="10000"></div>
    </div>
    <div class="field"><label>Mode de paiement</label><select id="f-paiement">${PAIEMENTS.map(p=>`<option>${p}</option>`).join('')}</select></div>
    <div class="modal-actions">
      <button class="btn ghost" onclick="closeModal()">Annuler</button>
      <button class="btn" onclick="submitOrder()">Enregistrer</button>
    </div>
  `;
  document.getElementById('overlay').classList.add('open');
}

function closeModal(){ document.getElementById('overlay').classList.remove('open'); }

function submitOrder(){
  const nom = document.getElementById('f-nom').value.trim();
  const tel = document.getElementById('f-tel').value.trim();
  const quartier = document.getElementById('f-quartier').value.trim();
  const produit = document.getElementById('f-produit').value;
  const couleur = document.getElementById('f-couleur').value;
  const qty = Math.max(1, parseInt(document.getElementById('f-qty').value)||1);
  const prix = Math.max(0, parseInt(document.getElementById('f-prix').value)||0);
  const paiement = document.getElementById('f-paiement').value;
  if(!nom || !tel){ showToast("Nom et téléphone requis"); return; }

  const dispo = state.stock[produit][couleur]||0;
  if(qty > dispo){ if(!confirm(`Stock disponible: ${dispo}. Continuer quand même ?`)) return; }

  state.commandes.push({
    id: Date.now().toString(),
    date: new Date().toISOString().slice(0,10),
    clientNom: nom, clientTel: tel, quartier,
    produit, couleur, quantite: qty, prixUnitaire: prix,
    modePaiement: paiement, statut: "Reçue"
  });
  state.stock[produit][couleur] = Math.max(0, dispo - qty);
  saveState();
  closeModal();
  render();
  showToast("Commande enregistrée");
}

function renderClients(){
  const map = {};
  state.commandes.forEach(c=>{
    const key = c.clientTel || c.clientNom;
    if(!map[key]) map[key] = {nom:c.clientNom, tel:c.clientTel, quartier:c.quartier, nbCommandes:0, total:0};
    map[key].nbCommandes += 1;
    if(c.statut!=='Annulée') map[key].total += c.quantite*c.prixUnitaire;
  });
  const clients = Object.values(map).sort((a,b)=> b.total - a.total);
  return `
    <div class="viewhead"><div><div class="eyebrow">Base clients</div><h2>Clients</h2></div></div>
    <div class="panel">
    ${clients.length===0 ? '<div class="empty">Aucun client pour le moment.</div>' : `
    <table><thead><tr><th>Nom</th><th>Téléphone</th><th>Quartier</th><th>Commandes</th><th>Total dépensé</th></tr></thead>
    <tbody>${clients.map(c=>`<tr><td>${c.nom}</td><td class="mono">${c.tel}</td><td>${c.quartier||'—'}</td><td class="mono">${c.nbCommandes}</td><td class="mono">${fmt(c.total)}</td></tr>`).join('')}</tbody></table>`}
    </div>
  `;
}

function renderFinances(){
  const k = computeKPIs();
  const parProduit = {};
  PRODUITS.forEach(p=> parProduit[p] = {qty:0, ca:0});
  state.commandes.filter(c=>c.statut!=='Annulée').forEach(c=>{
    parProduit[c.produit].qty += c.quantite;
    parProduit[c.produit].ca += c.quantite*c.prixUnitaire;
  });
  const parCategorie = {};
  CATEGORIES_DEPENSES.forEach(cat=> parCategorie[cat]=0);
  state.depenses.forEach(d=>{ parCategorie[d.categorie] = (parCategorie[d.categorie]||0) + d.montant; });

  return `
    <div class="viewhead"><div><div class="eyebrow">Bilan</div><h2>Finances</h2></div></div>
    <div class="kpis">
      <div class="kpi c-gold"><div class="label">CA total</div><div class="value mono">${fmt(k.ca)}</div></div>
      <div class="kpi c-rose"><div class="label">Coût marchandise</div><div class="value mono">${fmt(k.cout)}</div></div>
      <div class="kpi c-terracotta"><div class="label">Dépenses générales</div><div class="value mono">${fmt(k.totalDepenses)}</div></div>
      <div class="kpi c-green"><div class="label">Bénéfice net</div><div class="value mono">${fmt(k.benefice)}</div></div>
    </div>
    <div class="panel">
      <div class="panel-title">Réglage — coût de revient</div>
      <div style="padding:16px;">
        <div class="field" style="max-width:260px;margin-bottom:0;">
          <label>Coût de revient par unité (FCFA)</label>
          <input type="number" value="${state.settings.coutUnitaire}" onchange="updateCout(this.value)">
        </div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">Détail par modèle</div>
      <table><thead><tr><th>Modèle</th><th>Unités vendues</th><th>Chiffre d'affaires</th></tr></thead>
      <tbody>${PRODUITS.map(p=>`<tr><td>${p}</td><td class="mono">${parProduit[p].qty}</td><td class="mono">${fmt(parProduit[p].ca)}</td></tr>`).join('')}</tbody></table>
    </div>
    <div class="panel">
      <div class="panel-title">Dépenses par catégorie</div>
      <table><thead><tr><th>Catégorie</th><th>Montant</th></tr></thead>
      <tbody>${CATEGORIES_DEPENSES.map(cat=>`<tr><td><span class="catpill" style="background:color-mix(in srgb, ${CATEGORIE_COLOR[cat]} 16%, transparent);color:${CATEGORIE_COLOR[cat]}"><span class="dot" style="background:${CATEGORIE_COLOR[cat]}"></span>${cat}</span></td><td class="mono">${fmt(parCategorie[cat]||0)}</td></tr>`).join('')}</tbody></table>
    </div>
  `;
}

function updateCout(val){
  state.settings.coutUnitaire = Math.max(0, parseInt(val)||0);
  saveState();
  render();
}

function renderDepenses(){
  const list = [...state.depenses].sort((a,b)=> b.date.localeCompare(a.date));
  const total = list.reduce((s,d)=> s + d.montant, 0);
  return `
    <div class="viewhead"><div><div class="eyebrow">Sorties d'argent</div><h2>Dépenses</h2></div><button class="btn" onclick="openExpenseForm()">+ Nouvelle dépense</button></div>
    <div class="kpis" style="grid-template-columns:1fr;">
      <div class="kpi c-terracotta"><div class="label">Total des dépenses enregistrées</div><div class="value mono">${fmt(total)}</div></div>
    </div>
    <div class="panel">
      ${list.length===0 ? '<div class="empty">Aucune dépense enregistrée pour le moment.</div>' : `
      <table><thead><tr><th>Date</th><th>Catégorie</th><th>Note</th><th>Montant</th><th></th></tr></thead>
      <tbody>${list.map(d=>`<tr>
        <td class="mono">${d.date}</td>
        <td><span class="catpill" style="background:color-mix(in srgb, ${CATEGORIE_COLOR[d.categorie]} 16%, transparent);color:${CATEGORIE_COLOR[d.categorie]}"><span class="dot" style="background:${CATEGORIE_COLOR[d.categorie]}"></span>${d.categorie}</span></td>
        <td>${d.note||'—'}</td>
        <td class="mono">${fmt(d.montant)}</td>
        <td><button class="btn ghost" onclick="deleteExpense('${d.id}')">Suppr.</button></td>
      </tr>`).join('')}</tbody></table>`}
    </div>
  `;
}

function openExpenseForm(){
  document.getElementById('modalBody').innerHTML = `
    <h3>Nouvelle dépense</h3>
    <div class="field"><label>Catégorie</label><select id="d-categorie">${CATEGORIES_DEPENSES.map(c=>`<option>${c}</option>`).join('')}</select></div>
    <div class="field-row">
      <div class="field"><label>Montant (FCFA)</label><input id="d-montant" type="number" min="0" placeholder="Ex: 15000"></div>
      <div class="field"><label>Date</label><input id="d-date" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
    </div>
    <div class="field"><label>Note (optionnel)</label><input id="d-note" placeholder="Ex: Rouleau de tissu écru"></div>
    <div class="modal-actions">
      <button class="btn ghost" onclick="closeModal()">Annuler</button>
      <button class="btn" onclick="submitExpense()">Enregistrer</button>
    </div>
  `;
  document.getElementById('overlay').classList.add('open');
}

function submitExpense(){
  const categorie = document.getElementById('d-categorie').value;
  const montant = Math.max(0, parseInt(document.getElementById('d-montant').value)||0);
  const date = document.getElementById('d-date').value || new Date().toISOString().slice(0,10);
  const note = document.getElementById('d-note').value.trim();
  if(montant<=0){ showToast("Indique un montant valide"); return; }
  state.depenses.push({ id: Date.now().toString(), date, categorie, montant, note });
  saveState();
  closeModal();
  render();
  showToast("Dépense enregistrée");
}

function deleteExpense(id){
  if(!confirm("Supprimer cette dépense ?")) return;
  state.depenses = state.depenses.filter(d=>d.id!==id);
  saveState();
  render();
}

function computeSoldeCaisse(){
  return state.caisse.reduce((s,m)=> s + (m.type==='entree' ? m.montant : -m.montant), 0);
}

function renderCaisse(){
  const solde = computeSoldeCaisse();
  const list = [...state.caisse].sort((a,b)=> b.date.localeCompare(a.date) || b.id.localeCompare(a.id));
  const totalEntrees = state.caisse.filter(m=>m.type==='entree').reduce((s,m)=> s+m.montant, 0);
  const totalSorties = state.caisse.filter(m=>m.type==='sortie').reduce((s,m)=> s+m.montant, 0);
  return `
    <div class="viewhead"><div><div class="eyebrow">Argent physique</div><h2>Caisse</h2></div>
      <div style="display:flex;gap:10px;">
        <button class="btn ghost" onclick="openCaisseForm('sortie')">− Sortie</button>
        <button class="btn" onclick="openCaisseForm('entree')">+ Entrée</button>
      </div>
    </div>
    <div class="kpis">
      <div class="kpi ${solde>=0?'c-green':'c-terracotta'}"><div class="label">Solde actuel</div><div class="value mono">${fmt(solde)}</div></div>
      <div class="kpi c-gold"><div class="label">Total entrées</div><div class="value mono">${fmt(totalEntrees)}</div></div>
      <div class="kpi c-terracotta"><div class="label">Total sorties</div><div class="value mono">${fmt(totalSorties)}</div></div>
    </div>
    <div class="panel">
      ${list.length===0 ? '<div class="empty">Aucun mouvement de caisse pour le moment.</div>' : `
      <table><thead><tr><th>Date</th><th>Type</th><th>Motif</th><th>Montant</th><th></th></tr></thead>
      <tbody>${list.map(m=>`<tr>
        <td class="mono">${m.date}</td>
        <td><span class="pill ${m.type==='entree'?'s4':'s5'}">${m.type==='entree'?'Entrée':'Sortie'}</span></td>
        <td>${m.motif||'—'}</td>
        <td class="mono" style="color:${m.type==='entree'?'var(--green)':'var(--terracotta)'}">${m.type==='entree'?'+':'−'} ${fmt(m.montant)}</td>
        <td><button class="btn ghost" onclick="deleteCaisseMouvement('${m.id}')">Suppr.</button></td>
      </tr>`).join('')}</tbody></table>`}
    </div>
  `;
}

function openCaisseForm(type){
  document.getElementById('modalBody').innerHTML = `
    <h3>${type==='entree' ? 'Nouvelle entrée' : 'Nouvelle sortie'}</h3>
    <div class="field-row">
      <div class="field"><label>Montant (FCFA)</label><input id="m-montant" type="number" min="0" placeholder="Ex: 20000"></div>
      <div class="field"><label>Date</label><input id="m-date" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
    </div>
    <div class="field"><label>Motif</label><input id="m-motif" placeholder="${type==='entree' ? 'Ex: Vente au marché, apport personnel' : 'Ex: Achat tissu, transport'}"></div>
    <div class="modal-actions">
      <button class="btn ghost" onclick="closeModal()">Annuler</button>
      <button class="btn" onclick="submitCaisseMouvement('${type}')">Enregistrer</button>
    </div>
  `;
  document.getElementById('overlay').classList.add('open');
}

function submitCaisseMouvement(type){
  const montant = Math.max(0, parseInt(document.getElementById('m-montant').value)||0);
  const date = document.getElementById('m-date').value || new Date().toISOString().slice(0,10);
  const motif = document.getElementById('m-motif').value.trim();
  if(montant<=0){ showToast("Indique un montant valide"); return; }
  state.caisse.push({ id: Date.now().toString(), date, type, montant, motif });
  saveState();
  closeModal();
  render();
  showToast(type==='entree' ? "Entrée enregistrée" : "Sortie enregistrée");
}

function deleteCaisseMouvement(id){
  if(!confirm("Supprimer ce mouvement de caisse ?")) return;
  state.caisse = state.caisse.filter(m=>m.id!==id);
  saveState();
  render();
}

loadState();
</script>
</body>
</html>
